<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
</head>
<style>
    body {
        background-color: rgb(111, 194, 188);
    }

    h1 {
        width: 200px;
        padding: 20px;
        margin-bottom: 5px;
        margin-left: 40%;
        margin-top: 10%;
        text-align: center;
        border: 2px solid black;
        border-radius: 20px;
    }

    h2 {
        margin-left: 40%;
        text-align: center;
        border: 2px solid black;
        width: 200px;
        padding: 20px;
        border-radius: 20px;
    }
    h3 {
        font-size: 50px;
        margin-right: 25px;
        text-align: center;
        color: rgb(20, 42, 171);
        letter-spacing: 5px;
    }
</style>
<script>
    function showTime() {

        let d = new Date();

        let h = d.getHours();
        let m = d.getMinutes();
        let s = d.getSeconds();

        document.getElementById("clock").innerHTML =
            h + " : " + m + " : " + s;

        document.getElementById("date").innerHTML =
            d.toLocaleDateString("en-US", {
                weekday: "short",
                month: "short",
                day: "numeric",
                year: "numeric"
            });
    }

    setInterval(showTime, 1000);

</script>

<body>
    <div>
        <h3>Digital Clock</h3>
    </div>
    <div>
        <h1 id="clock"></h1>
        <h2 id="date"></h2>
    </div>
</body>
